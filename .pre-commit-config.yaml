repos:
  - repo: local
    hooks:
      - id: drift-pre-push
        name: drift pre-push ingest
        entry: uv run python scripts/drift_pre_push.py
        language: system
        pass_filenames: false
        stages: [pre-push]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.4
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        args: ["--config-file=pyproject.toml", "--no-incremental"]
        files: ^src/

  - repo: https://github.com/crate-ci/typos
    rev: v1.37.1
    hooks:
      - id: typos
        args: ["--config", "_typos.toml"]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.18.1
    hooks:
      - id: markdownlint-cli2
        args: ["--config", ".markdownlint-cli2.jsonc"]
